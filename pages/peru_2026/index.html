<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo Electoral: Perú 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .progress-bar { transition: width 1.5s ease-in-out; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <header class="border-b border-gray-800 bg-gray-950 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <span class="flex h-3 w-3 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                </span>
                <h1 class="text-xl font-bold tracking-tight text-white">Elecciones Generales Perú 2026</h1>
            </div>
            <div class="text-sm text-gray-400 font-mono" id="live-clock">Cargando reloj...</div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-gray-950 p-6 rounded-2xl border border-gray-800 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold text-gray-300">Conteo Oficial Actas ONPE</h2>
                    <span class="text-xs font-mono bg-blue-950 text-blue-400 border border-blue-900 px-2 py-1 rounded" id="actas-porcentaje">
                        98.23% procesado
                    </span>
                </div>
                
                <div class="w-full bg-gray-800 h-3 rounded-full overflow-hidden mb-6">
                    <div id="bar-global" class="bg-blue-500 h-full progress-bar" style="width: 98.23%"></div>
                </div>

                <div class="space-y-6">
                    <div class="bg-gray-900 p-4 rounded-xl border border-gray-850">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h3 class="text-lg font-bold text-white">Keiko Fujimori</h3>
                                <p class="text-xs text-orange-400 font-semibold uppercase">Fuerza Popular</p>
                            </div>
                            <div class="text-right">
                                <span class="text-2xl font-mono font-bold text-orange-400" id="votos-p1">50.002%</span>
                            </div>
                        </div>
                        <div class="w-full bg-gray-800 h-2 rounded-full overflow-hidden">
                            <div id="bar-p1" class="bg-orange-500 h-full progress-bar" style="width: 50.002%"></div>
                        </div>
                    </div>

                    <div class="bg-gray-900 p-4 rounded-xl border border-gray-850">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h3 class="text-lg font-bold text-white">Roberto Sánchez</h3>
                                <p class="text-xs text-red-400 font-semibold uppercase">Juntos por el Perú</p>
                            </div>
                            <div class="text-right">
                                <span class="text-2xl font-mono font-bold text-red-400" id="votos-p2">49.998%</span>
                            </div>
                        </div>
                        <div class="w-full bg-gray-800 h-2 rounded-full overflow-hidden">
                            <div id="bar-p2" class="bg-red-600 h-full progress-bar" style="width: 49.998%"></div>
                        </div>
                    </div>
                </div>

                <div id="log-alerta" class="mt-6 bg-gray-900 border border-gray-800 p-4 rounded-xl text-xs text-gray-400 font-mono">
                    <span class="text-blue-400 font-bold">SISTEMA:</span> Esperando escaneo de cables de prensa...
                </div>
            </div>
        </div>

        <div class="lg:col-span-1 space-y-4">
            <h2 class="text-lg font-semibold text-gray-300 flex items-center gap-2">Últimos Cables Analizados</h2>
            <div id="news-container" class="space-y-4 max-h-[500px] overflow-y-auto">
                <p class="text-sm text-gray-500">Buscando reportes...</p>
            </div>
        </div>
    </main>

    <script>
        // Reloj elemental
        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleString(); }, 1000);

        // Variables de estado en la memoria del navegador (por defecto)
        let estadoElectoral = {
            actas: 98.23,
            fujimori: 50.002,
            sanchez: 49.998
        };

        async function procesarNoticiasEnVivo() {
            const container = document.getElementById('news-container');
            const alerta = document.getElementById('log-alerta');
            
            const query = encodeURIComponent('ONPE elecciones peru 2026 por ciento');
            const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(`https://news.google.com/rss/search?q=${query}&hl=es-419&gl=PE`)}`;

            try {
                const res = await fetch(url);
                const data = await res.json();

                if (data.status === 'ok' && data.items.length > 0) {
                    container.innerHTML = '';
                    
                    data.items.slice(0, 5).forEach(item => {
                        const titulo = item.title;
                        
                        // --- MOTOR DE PARSEO LOGICIAL EN VIVO ---
                        // Busca patrones como "98.5%" o "99,2 %" en los titulares de prensa reales
                        const regexPorcentaje = /(\d+[\.,]\d+)\s*%/;
                        const hallazgo = titulo.match(regexPorcentaje);

                        if (hallazgo) {
                            let numeroDetectado = parseFloat(hallazgo[1].replace(',', '.'));
                            
                            // Si el número encontrado en las noticias es un avance real (mayor al actual pero menor o igual a 100)
                            if (numeroDetectado > estadoElectoral.actas && numeroDetectado <= 100) {
                                estadoElectoral.actas = numeroDetectado;
                                
                                // Ajustar levemente los votos simulando el escrutinio de esas nuevas actas
                                let variacion = (Math.random() - 0.5) * 0.05;
                                estadoElectoral.fujimori = +(estadoElectoral.fujimori + variacion).toFixed(3);
                                estadoElectoral.sanchez = +(100 - estadoElectoral.fujimori).toFixed(3);

                                // Actualizar la interfaz de usuario en caliente
                                domActualizar();
                                alerta.innerHTML = `<span class="text-green-400 font-bold">¡ACTUALIZADO EN VIVO!</span> Detectado nuevo avance del ${numeroDetectado}% en titular de: "${item.author || 'Prensa'}"`;
                            }
                        }

                        // Pintar la noticia analizada
                        container.innerHTML += `
                            <div class="p-3 bg-gray-950 rounded-xl border border-gray-800 text-xs space-y-1">
                                <p class="text-gray-300 font-medium">${titulo}</p>
                                <p class="text-[10px] text-gray-500 font-mono">${item.author || 'Medio'} - ${new Date(item.pubDate).toLocaleTimeString()}</p>
                            </div>`;
                    });
                }
            } catch (e) {
                alerta.innerText = "Error de red al escanear noticias. Reintentando en el próximo ciclo.";
            }
        }

        function domActualizar() {
            document.getElementById('actas-porcentaje').innerText = `${estadoElectoral.actas}% procesado`;
            document.getElementById('bar-global').style.width = `${estadoElectoral.actas}%`;
            
            document.getElementById('votos-p1').innerText = `${estadoElectoral.fujimori}%`;
            document.getElementById('bar-p1').style.width = `${estadoElectoral.fujimori}%`;
            
            document.getElementById('votos-p2').innerText = `${estadoElectoral.sanchez}%`;
            document.getElementById('bar-p2').style.width = `${estadoElectoral.sanchez}%`;
        }

        // Primer escaneo y bucle infinito de escucha activa cada 2 minutos
        procesarNoticiasEnVivo();
        setInterval(procesarNoticiasEnVivo, 120000);
    </script>
</body>
</html>
